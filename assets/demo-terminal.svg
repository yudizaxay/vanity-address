<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="Vanity Address terminal demo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#12151a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="920" height="560" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="1" y="1" width="918" height="558" rx="15" fill="none" stroke="#2d3340" stroke-width="1"/>
  <rect x="0" y="0" width="920" height="36" rx="16" fill="#0f1115"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="84" y="22" fill="#6b7280" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12">Vanity Address &#8212; zsh &#8212; 120x32</text>

  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14">
    <text x="28" y="72" fill="#67e8f9" font-weight="700">  +------------------------------------------+</text>
    <text x="28" y="94" fill="#67e8f9" font-weight="700">  |      Vanity Address  &#183;  v0.3.0        |</text>
    <text x="28" y="116" fill="#67e8f9">  |   multi-chain vanity address generator   |</text>
    <text x="28" y="138" fill="#67e8f9" font-weight="700">  +------------------------------------------+</text>

    <text x="28" y="176" fill="#9ca3af">  [1]  Start a new grind</text>
    <text x="28" y="198" fill="#9ca3af">  [2]  Help &amp; pattern rules</text>
    <text x="28" y="220" fill="#9ca3af">  [3]  Exit</text>
    <text x="28" y="252" fill="#e5e7eb">  Choose option [1-3]: <tspan fill="#22d3ee">1</tspan></text>

    <text x="28" y="296" fill="#9ca3af">  Chain</text>
    <text x="120" y="296" fill="#f3f4f6" font-weight="700">Solana</text>
    <text x="28" y="318" fill="#9ca3af">  Target</text>
    <text x="120" y="318" fill="#f3f4f6" font-weight="700">ending with 'axay'</text>
    <text x="28" y="340" fill="#9ca3af">  Expected</text>
    <text x="120" y="340" fill="#fbbf24">~656.4M attempts</text>
    <text x="28" y="362" fill="#9ca3af">  Measured</text>
    <text x="120" y="362" fill="#4ade80">~2.1M keys/sec</text>

    <text x="28" y="404" fill="#22d3ee">*</text>
    <text x="44" y="404" fill="#e5e7eb"> 12.4M keys | </text>
    <text x="168" y="404" fill="#4ade80">2,198,421 keys/s</text>
    <text x="318" y="404" fill="#e5e7eb"> | ~5 min remaining</text>

    <text x="28" y="448" fill="#4ade80" font-weight="700"> Match found!</text>
    <text x="28" y="476" fill="#9ca3af">  Address</text>
    <text x="120" y="476" fill="#f3f4f6" font-weight="700">7xKp&#8230;Qaxay</text>
    <text x="28" y="498" fill="#9ca3af">  Time</text>
    <text x="120" y="498" fill="#e5e7eb">142.31s &#183; 312,847,291 attempts</text>
  </g>
</svg>
