version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # Major (and 0.x "minor") bumps need manual migration for crypto/random crates
      - dependency-name: "rand"
        update-types: ["version-update:semver-major"]
      - dependency-name: "secp256k1"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sha2"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sha3"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      rust-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/vanity-app"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
