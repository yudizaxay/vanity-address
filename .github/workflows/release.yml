name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.3.0)"
        required: true
        default: "0.3.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Tag push → v0.3.0 | manual run → input version
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}

jobs:
  build-cli:
    name: CLI (${{ matrix.asset_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            asset_label: Linux-CLI
            archive: tar
            bin: vanity-address
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            asset_label: Mac-AppleSilicon-CLI
            archive: tar
            bin: vanity-address
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
            asset_label: Mac-Intel-CLI
            archive: tar
            bin: vanity-address
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            asset_label: Windows-CLI
            archive: zip
            bin: vanity-address.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p vanity-address

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.bin }}

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#v}"
          ASSET="VanityAddress-${VERSION}-${{ matrix.asset_label }}"
          STAGING="dist/_pack-${ASSET}"
          mkdir -p "${STAGING}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${STAGING}/vanity-address"
          cp README.md LICENSE SECURITY.md "${STAGING}/"
          tar -czf "dist/${ASSET}.tar.gz" -C "${STAGING}" .
          shasum -a 256 "dist/${ASSET}.tar.gz" > "dist/${ASSET}.tar.gz.sha256"

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = $env:RELEASE_VERSION.TrimStart('v')
          $ASSET = "VanityAddress-$VERSION-${{ matrix.asset_label }}"
          $STAGING = "dist/_pack-$ASSET"
          New-Item -ItemType Directory -Force -Path $STAGING | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGING/vanity-address.exe"
          Copy-Item README.md, LICENSE, SECURITY.md $STAGING/
          Compress-Archive -Path "$STAGING/*" -DestinationPath "dist/$ASSET.zip" -Force
          $hash = (Get-FileHash "dist/$ASSET.zip" -Algorithm SHA256).Hash.ToLower()
          "${hash}  ${ASSET}.zip" | Set-Content -Path "dist/$ASSET.zip.sha256" -NoNewline

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: cli-${{ matrix.name }}
          path: dist/VanityAddress-*.*

  build-desktop:
    name: Desktop (Mac Apple Silicon .dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vanity-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: vanity-app
        run: npm ci

      - name: Build desktop bundle
        working-directory: vanity-app
        run: npm run tauri build -- --bundles dmg

      - name: Package desktop .dmg
        run: |
          VERSION="${RELEASE_VERSION#v}"
          ASSET="VanityAddress-${VERSION}-Mac-AppleSilicon-Desktop.dmg"
          mkdir -p dist

          for BUNDLE_DIR in "target/release/bundle" "vanity-app/src-tauri/target/release/bundle"; do
            if [ -d "${BUNDLE_DIR}/dmg" ]; then
              DMG=$(find "${BUNDLE_DIR}/dmg" -name "*.dmg" -print -quit)
              if [ -n "$DMG" ]; then
                echo "Found DMG at ${DMG}"
                cp "$DMG" "dist/${ASSET}"
                shasum -a 256 "dist/${ASSET}" > "dist/${ASSET}.sha256"
                exit 0
              fi
            fi
          done

          echo "No .dmg found in workspace bundle directories"
          find target -name "*.dmg" 2>/dev/null || true
          find vanity-app -name "*.dmg" 2>/dev/null || true
          exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-macos-arm64
          path: dist/VanityAddress-*.*

  release:
    name: Publish GitHub Release
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -la dist/

      - name: Compose release notes
        run: |
          {
            cat .github/release-downloads.md
            echo ""
            cat CHANGELOG.md
          } > dist/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: false
          files: dist/VanityAddress-*.*
          body_path: dist/RELEASE_NOTES.md
