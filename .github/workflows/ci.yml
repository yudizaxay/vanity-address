name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # vanity-core + vanity-address — no GTK/WebKit system deps required
  cli:
    name: CLI & core (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p vanity-address

      - name: Run tests
        run: cargo test -p vanity-core -p vanity-address

      - name: Clippy
        run: cargo clippy -p vanity-core -p vanity-address -- -D warnings

  # vanity-app (Tauri) needs WebKit/GTK on Linux — validate on macOS instead
  desktop:
    name: Desktop app (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test -p vanity-app

      - name: Clippy
        run: cargo clippy -p vanity-app -- -D warnings
