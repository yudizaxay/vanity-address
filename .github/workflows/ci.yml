name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # vanity-core + vanity-address — no GTK/WebKit system deps required
  cli:
    name: CLI & core (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: matrix.label == 'Linux'
        run: cargo fmt --all -- --check

      - name: Build release
        run: cargo build --release -p vanity-address

      - name: Run tests
        run: cargo test -p vanity-core -p vanity-address

      - name: Clippy
        run: cargo clippy -p vanity-core -p vanity-address -- -D warnings

  # vanity-app (Tauri) — validate on macOS + Windows (Linux needs WebKit/GTK)
  desktop:
    name: Desktop app (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vanity-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: vanity-app
        run: npm ci

      - name: Typecheck and build frontend
        working-directory: vanity-app
        run: npm run build

      - name: Run tests
        run: cargo test -p vanity-app

      - name: Clippy
        run: cargo clippy -p vanity-app -- -D warnings
