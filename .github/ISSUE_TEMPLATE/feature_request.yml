name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For large features (new UI, GPU grinding, regex patterns), describe the problem first so we can align on scope before you invest in a PR.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain point does this solve?
      placeholder: "I want to grind Bitcoin SegWit bc1 addresses because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New blockchain
        - CLI / UX
        - Performance
        - Pattern matching
        - Desktop UI (Tauri)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you tried

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this
        - label: I can help test a prototype
